name: Flathead Lake Daily Report

on:
  schedule:
    # 6:00 AM MT = 12:00 UTC (UTC-6 MDT in summer). Adjust to 13:00 UTC in winter (UTC-7 MST).
    - cron: "0 13 * * *"
  workflow_dispatch:   # lets you trigger a test run manually from the Actions tab

permissions:
  contents: write      # required to commit the updated database back to the repo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Flathead Lake report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS_FLATHEAD }}
        run: python src/main.py --config flathead_config.json

      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/flathead.db
          # Only commit and push if the DB actually changed
          if git diff --staged --quiet; then
            echo "No DB changes to commit."
          else
            git commit -m "chore: flathead data $(date -u +%Y-%m-%d)"
            git pull --rebase -X ours origin main
            git push
          fi
